version: 2

models:
  - name: stg_play_events
    columns:
      - name: event_id
        data_tests:
          - not_null
          - unique
      - name: track_id
        data_tests:
          - not_null 
      - name: played_at
        data_tests:
          - not_null
      - name: primary_artist_id
        data_tests:
          - not_null
  
  - name: stg_track_audio_features
    columns:
      - name: track_id 
        data_tests:
          - not_null
          - unique
      - name: danceability
        data_tests:
          - not_null
      - name: energy
        data_tests:
          - not_null

  - name: stg_artist_genres
    columns:
      - name: artist_id
        data_tests:
          - not_null
          - unique