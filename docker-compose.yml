services:
  kafka:
    image: apache/kafka:4.2.0
    hostname: broker
    container_name: broker
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - spotify-net

  kafka-setup:
    image: apache/kafka:4.2.0
    container_name: kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker:29092 --create --if-not-exists --topic spotify.play.events --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker:29092 --create --if-not-exists --topic spotify.audio.features --partitions 1 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker:29092 --create --if-not-exists --topic spotify.artist.genres --partitions 1 --replication-factor 1 &&
        echo 'Kafka topics created successfully.'
      "
    networks:
      - spotify-net
    
  producer:
    build:
      context: . # project root
      dockerfile: producer/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS_INTERNAL}
      - KAFKA_TOPIC_PLAY_EVENTS=${KAFKA_TOPIC_PLAY_EVENTS}
      - KAFKA_TOPIC_AUDIO_FEATURES=${KAFKA_TOPIC_AUDIO_FEATURES}
      - KAFKA_TOPIC_ARTIST_GENRES=${KAFKA_TOPIC_ARTIST_GENRES}
      # env from SpotifyClient
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI}
      - SPOTIFY_TOKEN_CACHE=/app/cache/.cache
    volumes:
      - ./cache:/app/cache
    networks:
      - spotify-net

  consumer:
    build:
      context: . # project root
      dockerfile: consumer/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS_INTERNAL}
      - KAFKA_TOPIC_PLAY_EVENTS=${KAFKA_TOPIC_PLAY_EVENTS}
      - KAFKA_TOPIC_AUDIO_FEATURES=${KAFKA_TOPIC_AUDIO_FEATURES}
      - KAFKA_TOPIC_ARTIST_GENRES=${KAFKA_TOPIC_ARTIST_GENRES}
      - KAFKA_CONSUMER_GROUP_ID=${KAFKA_CONSUMER_GROUP_ID}
      # env for database
      - POSTGRES_HOST=${POSTGRES_HOST_INTERNAL}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - PG_SPOTIFY_DB=${PG_SPOTIFY_DB}
      - PG_SPOTIFY_DB_USER=${PG_SPOTIFY_DB_USER}
      - PG_SPOTIFY_DB_USER_PASSWORD=${PG_SPOTIFY_DB_USER_PASSWORD}
    networks:
      - spotify-net


  postgres:
    image: postgres:16
    container_name: spotify_pg_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PG_SPOTIFY_DB_USER: ${PG_SPOTIFY_DB_USER}
      PG_SPOTIFY_DB_USER_PASSWORD: ${PG_SPOTIFY_DB_USER_PASSWORD}
      PG_SPOTIFY_DB: ${PG_SPOTIFY_DB}
      PG_PREFECT_USER: ${PG_PREFECT_USER}
      PG_PREFECT_USER_PASSWORD: ${PG_PREFECT_USER_PASSWORD}
      PG_PREFECT_DB: ${PG_PREFECT_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_ADMIN_USER}\" -d \"${POSTGRES_DB}\" -h localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    stop_grace_period: 120s
    volumes:
      - ./volumes/postgres/data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro # Run on initialisation to create databases
    networks: 
      - spotify-net
  
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis/data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: 
      - spotify-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: mlflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://${PG_SPOTIFY_DB_USER}:${PG_SPOTIFY_DB_USER_PASSWORD}@postgres:5432/${PG_SPOTIFY_DB}
      MLFLOW_ARTIFACTS_DESTINATION: /mlflow/artifacts
    command: >
      bash -c "pip install uv --quiet &&
      uv pip install psycopg2-binary --system --quiet &&
      mlflow server
      --backend-store-uri postgresql+psycopg2://${PG_SPOTIFY_DB_USER}:${PG_SPOTIFY_DB_USER_PASSWORD}@postgres:5432/${PG_SPOTIFY_DB}
      --artifacts-destination /mlflow/artifacts
      --host 0.0.0.0
      --port 5555"
    ports:
      - "5555:5555"
    volumes:
      - ./volumes/mlflow/artifacts:/mlflow/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:5555/health', timeout=1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - spotify-net

  prefect-server:
    image: prefecthq/prefect:3-latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${PG_PREFECT_USER}:${PG_PREFECT_USER_PASSWORD}@postgres:5432/${PG_PREFECT_DB}
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_UI_API_URL: http://localhost:4200/api
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: redis
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 0
    command: prefect server start --no-services
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:4200/api/health', timeout=1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks: 
      - spotify-net

  prefect-services:
    image: prefecthq/prefect:3-latest
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${PG_PREFECT_USER}:${PG_PREFECT_USER_PASSWORD}@postgres:5432/${PG_PREFECT_DB}
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: redis
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 0
    command: prefect server services start
    networks: 
      - spotify-net

  prefect-worker:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    volumes:
      - .:/app
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PG_SPOTIFY_DB_USER_PASSWORD: ${PG_SPOTIFY_DB_USER_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST_INTERNAL}
      REDIS_HOST: ${REDIS_HOST_INTERNAL}
      FEAST_DB_USER: ${FEAST_DB_USER}
      FEAST_DB_USER_PASSWORD: ${FEAST_DB_USER_PASSWORD}
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: http://mlflow:5555
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME}
      DBT_PROJECT_DIR: /app/dbt
      DBT_PROFILES_DIR: /app/dbt/profiles
    restart: on-failure
    networks:
      - spotify-net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5555
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME}
      POSTGRES_HOST: ${POSTGRES_HOST_INTERNAL}
      POSTGRES_PORT: ${POSTGRES_PORT}
      PG_SPOTIFY_DB: ${PG_SPOTIFY_DB}
      PG_SPOTIFY_DB_USER: ${PG_SPOTIFY_DB_USER}
      PG_SPOTIFY_DB_USER_PASSWORD: ${PG_SPOTIFY_DB_USER_PASSWORD}
      FEAST_DB_USER: ${FEAST_DB_USER}
      FEAST_DB_USER_PASSWORD: ${FEAST_DB_USER_PASSWORD}
      REDIS_HOST: ${REDIS_HOST_INTERNAL}
      REDIS_PORT: ${REDIS_PORT}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
      SPOTIFY_TOKEN_CACHE: ${SPOTIFY_TOKEN_CACHE}
      LASTFM_API_KEY: ${LASTFM_API_KEY}
      PYTHONPATH: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8000/health', timeout=1)"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: on-failure
    networks:
      - spotify-net


networks:
  spotify-net:
    driver: bridge
