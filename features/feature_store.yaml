project: spotify_intelligence
provider: local

registry:
  registry_type: sql
  path: postgresql+psycopg2://spotify-sa:${PG_SPOTIFY_DB_USER_PASSWORD}@${POSTGRES_HOST}:5432/spotify

offline_store:
  type: postgres
  host: ${POSTGRES_HOST}
  port: 5432
  database: spotify
  db_schema: feast
  user: spotify-sa
  password: ${PG_SPOTIFY_DB_USER_PASSWORD}

online_store:
  type: redis
  connection_string: ${REDIS_HOST}:6379

entity_key_serialization_version: 2